<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>One Last Click - Memories Forever</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow-soft: 0 25px 50px rgba(0, 0, 0, 0.3);
            --shadow-hover: 0 35px 70px rgba(0, 0, 0, 0.4);
            --shadow-glass: 0 20px 40px rgba(0, 0, 0, 0.2);
            --text-primary: #F8F9FA;
            --text-secondary: rgba(248, 249, 250, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--primary-gradient);
            min-height: 100vh;
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255,255,255,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255,255,255,0.06) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(255,255,255,0.04) 0%, transparent 50%);
            background-repeat: no-repeat;
            background-size: 400px 400px, 300px 300px, 200px 200px;
            animation: floatBG 20s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes floatBG {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* Login Screen */
        #loginScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .login-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 3rem 2.5rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: var(--shadow-glass);
            max-width: 420px;
            width: 90%;
            animation: slideUp 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-box h2 {
            font-size: clamp(1.5rem, 4vw, 2rem);
            font-weight: 700;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, var(--text-primary), rgba(255,255,255,0.8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-group input {
            width: 100%;
            padding: 1.25rem 1.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            color: var(--text-primary);
            font-size: 1.1rem;
            font-weight: 500;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .input-group input:focus {
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
            transform: scale(1.02);
        }

        .login-btn {
            width: 100%;
            padding: 1.25rem;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: var(--shadow-soft);
            position: relative;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            margin-bottom: 1rem;
        }

        .login-btn:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: var(--shadow-hover);
        }

        .forgot-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .forgot-link:hover {
            color: var(--text-primary);
        }

        /* Forgot Password Modal */
        #forgotModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .forgot-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            padding: 2.5rem;
            border-radius: 24px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        /* Main Content */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 3rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: var(--shadow-glass);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-wrapper {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            color: var(--text-primary);
        }

        .brand-logo {
            height: 45px;
            width: auto;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(10px);
        }

        .brand-name {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), rgba(255,255,255,0.8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .contact {
            font-size: 0.9rem;
            color: var(--text-primary);
            text-decoration: none;
            border: 1.5px solid var(--glass-border);
            padding: 0.75rem 1.75rem;
            border-radius: 30px;
            font-weight: 600;
            transition: all 0.4s ease;
            backdrop-filter: blur(10px);
        }

        .contact:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-3px);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .image-box {
            width: 95%;
            max-width: 800px;
            border-radius: 28px;
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            transition: all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            margin-bottom: 2rem;
        }

        .image-box img {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 28px;
            transition: transform 0.6s ease;
        }

        .image-box:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: var(--shadow-hover);
        }

        .image-box:hover img {
            transform: scale(1.02);
        }

        .batch-name {
            font-size: clamp(1.5rem, 3vw, 2.2rem);
            font-weight: 700;
            letter-spacing: 0.05em;
            text-align: center;
            margin-bottom: 2.5rem;
            background: linear-gradient(135deg, var(--text-primary), rgba(255,255,255,0.8));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .memories-btn {
            padding: 1.25rem 4rem;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
            color: var(--text-primary);
            font-weight: 700;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: var(--shadow-soft);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
        }

        .memories-btn:hover {
            transform: translateY(-6px) scale(1.05);
            box-shadow: var(--shadow-hover);
        }

        .memories-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        footer {
            text-align: center;
            padding: 3rem 2rem;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .social-btn {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            border: 2px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            color: var(--text-primary);
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: var(--shadow-soft);
        }

        .social-btn:hover {
            transform: translateY(-6px) scale(1.1);
            box-shadow: var(--shadow-hover);
        }

        /* Animations */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--text-primary);
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-shake {
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            header {
                padding: 1rem 1.2rem;
                flex-direction: column;
                gap: 1rem;
                text-align: center;
            }
            
            .main {
                padding: 2rem 1rem;
                gap: 1.5rem;
            }
            
            .login-box, .forgot-box {
                padding: 2rem 1.5rem;
                margin: 1rem;
                width: calc(100% - 2rem);
            }
            
            .image-box {
                width: 100%;
                max-width: 100%;
                margin-bottom: 1.5rem;
            }
            
            .batch-name {
                font-size: 1.4rem !important;
                padding: 0 1rem;
                line-height: 1.3;
            }
            
            .memories-btn {
                padding: 1rem 3rem;
                font-size: 1.1rem;
                min-width: 280px;
            }
            
            footer {
                padding: 2rem 1rem;
            }
            
            .social-links {
                gap: 1.2rem;
            }
            
            .social-btn {
                width: 52px;
                height: 52px;
                font-size: 1.3rem;
            }
        }

        @media (max-width: 480px) {
            .social-links {
                flex-direction: column;
                align-items: center;
                gap: 1rem;
            }
            
            .social-btn {
                width: 60px;
                height: 60px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Login Screen -->
    <div id="loginScreen">
        <div class="login-box">
            <h2>🔐 Batch Login</h2>
            <div class="input-group">
                <input type="text" id="batchCode" placeholder="Enter Batch Code (User ID)" maxlength="20">
            </div>
            <div class="input-group">
                <input type="password" id="batchPassword" placeholder="Enter Password">
            </div>
            <button class="login-btn" onclick="login()">Login</button>
            <a href="#" class="forgot-link" onclick="showForgotPassword(event)">Forgot Password?</a>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotModal">
        <div class="forgot-box">
            <h3>🔑 Recover Password</h3>
            <div class="input-group">
                <input type="text" id="forgotBatchCode" placeholder="Batch Code">
            </div>
            <div class="input-group">
                <input type="text" id="recoveryCode" placeholder="8-digit Recovery Code" maxlength="8">
            </div>
            <button class="login-btn" onclick="recoverPassword()">Recover</button>
            <button class="login-btn" onclick="closeForgotPassword()" style="background: rgba(255,0,0,0.3); margin-top: 1rem;">Back</button>
        </div>
    </div>

    <!-- Header -->
    <header style="display: none;" id="header">
        <a href="#" class="brand-wrapper">
            <img src="images/logo.png" class="brand-logo" alt="One Last Click" loading="lazy">
            <div class="brand-name">One Last Click</div>
        </a>
        <a href="mailto:onelastclick.olc@gmail.com" class="contact">Contact Us</a>
    </header>

    <!-- Main Content -->
    <div class="main" style="display: none;" id="mainContent">
        <div class="image-box">
            <img id="batchImage" src="" alt="Batch Portrait">
        </div>
        <div class="batch-name" id="batchName">Loading...</div>
        <button class="memories-btn" onclick="openMemories()" id="memoriesBtn" disabled>
            Explore Memories
        </button>
    </div>

    <!-- Footer -->
    <footer>
        <div>Memories preserved forever by <strong>One Last Click</strong></div>
        <div class="social-links">
            <a href="https://www.instagram.com/onelastclick.olc/" class="social-btn" target="_blank" title="Instagram">📷</a>
            <a href="https://wa.me/9502342449" class="social-btn" target="_blank" title="WhatsApp">💬</a>
            <a href="tel:+919502342449" class="social-btn" target="_blank" title="Call">📞</a>
        </div>
    </footer>

    <script>
        let currentBatch = null;
        let batchesData = {};

        // Load batches data
        fetch('batches.json')
            .then(response => response.json())
            .then(data => {
                batchesData = data;
            })
            .catch(() => {
                console.error('Failed to load batches.json');
            });

        function login() {
            const batchCode = document.getElementById('batchCode').value.trim();
            const password = document.getElementById('batchPassword').value.trim();
            const loginBtn = document.querySelector('.login-btn');

            if (!batchCode || !password) {
                shakeInput('batchPassword');
                return;
            }

            if (!batchesData[batchCode]) {
                shakeInput('batchCode');
                return;
            }

            if (batchesData[batchCode].password !== password) {
                shakeInput('batchPassword');
                return;
            }

            // Success
            currentBatch = batchesData[batchCode];
            loginBtn.innerHTML = '<div class="loading"></div>Unlocking...';
            
            setTimeout(() => {
                document.getElementById('loginScreen').style.display = 'none';
                showMainContent();
            }, 800);
        }

        function showMainContent() {
            document.getElementById('header').style.display = 'flex';
            document.getElementById('mainContent').style.display = 'flex';
            
            document.getElementById('batchImage').src = currentBatch.image;
            document.getElementById('batchName').textContent = currentBatch.name;
            document.getElementById('memoriesBtn').disabled = false;
        }

        function openMemories() {
            if (currentBatch.drive) {
                const btn = document.getElementById('memoriesBtn');
                btn.innerHTML = '<div class="loading"></div>Loading...';
                setTimeout(() => {
                    window.open(currentBatch.drive, '_blank');
                    btn.innerHTML = 'Explore Memories';
                }, 500);
            }
        }

        function showForgotPassword(event) {
            event.preventDefault();
            document.getElementById('forgotModal').style.display = 'flex';
        }

        function closeForgotPassword() {
            document.getElementById('forgotModal').style.display = 'none';
            document.getElementById('forgotBatchCode').value = '';
            document.getElementById('recoveryCode').value = '';
        }

        function recoverPassword() {
            const batchCode = document.getElementById('forgotBatchCode').value.trim();
            const recoveryCode = document.getElementById('recoveryCode').value.trim();

            if (!batchCode || !recoveryCode) {
                alert('Please enter both Batch Code and Recovery Code');
                return;
            }

            if (!batchesData[batchCode]) {
                alert('Batch Code not found');
                return;
            }

            if (batchesData[batchCode].recovery !== recoveryCode) {
                alert('Invalid Recovery Code');
                return;
            }

            alert(`Password: ${batchesData[batchCode].password}`);
            closeForgotPassword();
        }

        function shakeInput(id) {
            const input = dfunction shakeInput(id) {
            const input = document.getElementById(id);
            input.classList.add('error-shake');
            setTimeout(() => input.classList.remove('error-shake'), 500);
        }

        // Enter key support
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (document.getElementById('forgotModal').style.display === 'flex') {
                    recoverPassword();
                } else {
                    login();
                }
            }
        });
    </script>
</body>
</html>
